<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhD Stats</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: transparent; padding: 1rem; }
  .title { font-size: 11px; font-weight: 500; color: #787774; margin-bottom: 0.75rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 0.75rem 0; }
  .stat-card { background: #f7f6f3; border-radius: 8px; padding: 0.85rem 1rem; text-align: center; }
  .stat-label { font-size: 11px; color: #787774; margin-bottom: 6px; line-height: 1.4; }
  .stat-number { font-size: 26px; font-weight: 500; color: #37352f; }
  .status-bar { display: flex; align-items: center; gap: 8px; margin: 0.75rem 0 0.25rem; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-text { font-size: 12px; color: #787774; }
  .btn-row { display: flex; gap: 8px; margin-top: 0.75rem; }
  .btn { font-size: 12px; padding: 5px 14px; cursor: pointer; border: 0.5px solid #d3d1c7; border-radius: 6px; background: white; color: #37352f; }
  .btn:hover { background: #f7f6f3; }
  .btn-danger { border-color: #f09595; color: #a32d2d; }
  .btn-danger:hover { background: #fcebeb; }
  .error-box { background: #fcebeb; border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 12px; color: #a32d2d; margin: 0.75rem 0; line-height: 1.6; }
  .updated { font-size: 11px; color: #b4b2a9; margin-top: 0.4rem; }
  .setup-card { background: #f7f6f3; border-radius: 10px; padding: 1.25rem; }
  .setup-title { font-size: 15px; font-weight: 500; color: #37352f; margin-bottom: 6px; }
  .setup-desc { font-size: 13px; color: #787774; margin-bottom: 1rem; line-height: 1.6; }
  .setup-label { font-size: 12px; color: #37352f; font-weight: 500; margin-bottom: 4px; display: block; }
  .setup-input { width: 100%; padding: 8px 10px; font-size: 13px; border: 0.5px solid #d3d1c7; border-radius: 6px; font-family: monospace; color: #37352f; background: white; margin-bottom: 0.75rem; }
  .setup-input:focus { outline: none; border-color: #9FE1CB; }
  .btn-primary { background: #37352f; color: white; border-color: #37352f; }
  .btn-primary:hover { background: #2f2d28; }
</style>
</head>
<body>

<div id="setup-view">
  <div class="setup-card">
    <div class="setup-title">Connect your Notion workspace</div>
    <div class="setup-desc">Enter your Notion API token below. It's saved in your browser only — it never touches GitHub or any server.</div>
    <label class="setup-label">Notion API token</label>
    <input class="setup-input" type="password" id="token-input" placeholder="ntn_..." />
    <div id="setup-error"></div>
    <button class="btn btn-primary" onclick="saveToken()">Save & load stats</button>
  </div>
</div>

<div id="stats-view" style="display:none;">
  <div class="title">PhD progress</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Experiments run</div><div class="stat-number" id="stat-experiments">—</div></div>
    <div class="stat-card"><div class="stat-label">Papers published</div><div class="stat-number" id="stat-published">—</div></div>
    <div class="stat-card"><div class="stat-label">Papers in progress</div><div class="stat-number" id="stat-inprogress">—</div></div>
    <div class="stat-card"><div class="stat-label">Conferences attended</div><div class="stat-number" id="stat-conferences">—</div></div>
    <div class="stat-card"><div class="stat-label">Papers read</div><div class="stat-number" id="stat-read">—</div></div>
  </div>
  <div id="status-area"></div>
  <div class="updated" id="updated-text"></div>
  <div class="btn-row">
    <button class="btn" onclick="fetchStats()">Refresh stats</button>
    <button class="btn btn-danger" onclick="resetToken()">Reset token</button>
  </div>
</div>

<script>
const PROXY = "https://notion-phd-proxy.ddragoljic99.workers.dev";
const DB = {
  experiments: "34f8639df38480f0a97cde2df914a695",
  papers: "34f8639df3848056a6f1c10cc5bd36e8",
  conferences: "34f8639df384807db46be575e1e1702d",
  reading: "34f8639df38480dcb59fce6544790c3b"
};

function getToken() { return localStorage.getItem("notion_phd_token"); }

function saveToken() {
  const val = document.getElementById("token-input").value.trim();
  if (!val.startsWith("ntn_") && !val.startsWith("secret_")) {
    document.getElementById("setup-error").innerHTML = `<div class="error-box">That doesn't look like a valid Notion token — it should start with ntn_ or secret_</div>`;
    return;
  }
  localStorage.setItem("notion_phd_token", val);
  showStats();
}

function resetToken() {
  localStorage.removeItem("notion_phd_token");
  document.getElementById("stats-view").style.display = "none";
  document.getElementById("setup-view").style.display = "block";
  document.getElementById("token-input").value = "";
}

function showStats() {
  document.getElementById("setup-view").style.display = "none";
  document.getElementById("stats-view").style.display = "block";
  fetchStats();
}

async function countAll(dbId, filter) {
  const TOKEN = getToken();
  let count = 0, cursor = undefined, hasMore = true;
  while (hasMore) {
    const body = {
      page_size: 100,
      ...(filter ? { filter } : {}),
      ...(cursor ? { start_cursor: cursor } : {})
    };
    const res = await fetch(`${PROXY}/proxy/v1/databases/${dbId}/query`, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${TOKEN}`,
        "Notion-Version": "2022-06-28",
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.object === "error") throw new Error(data.message);
    count += data.results.length;
    hasMore = data.has_more;
    cursor = data.next_cursor;
  }
  return count;
}

function setStatus(msg, isError) {
  document.getElementById("status-area").innerHTML = isError
    ? `<div class="error-box">${msg}</div>`
    : `<div class="status-bar"><div class="status-dot" style="background:#1D9E75"></div><span class="status-text">${msg}</span></div>`;
}

function setStat(id, val) { document.getElementById(id).textContent = val; }

async function fetchStats() {
  setStatus("Fetching from Notion...");
  ["stat-experiments","stat-published","stat-inprogress","stat-conferences","stat-read"].forEach(id => setStat(id, "…"));
  try {
    const [
      experiments,
      inProgress,
      read,
      papersAccepted,
      papersPublished,
      conferences
    ] = await Promise.all([
      countAll(DB.experiments, { property: "status", status: { equals: "complete" } }),
      countAll(DB.papers, { property: "status", status: { equals: "in progress" } }),
      countAll(DB.reading, { property: "status", status: { equals: "complete" } }),
      countAll(DB.papers, { property: "status", status: { equals: "accepted" } }),
      countAll(DB.papers, { property: "status", status: { equals: "published" } }),
      countAll(DB.conferences, { property: "status", status: { equals: "attended" } })
    ]);

    setStat("stat-experiments", experiments);
    setStat("stat-published", papersAccepted + papersPublished);
    setStat("stat-inprogress", inProgress);
    setStat("stat-conferences", conferences);
    setStat("stat-read", read);

    setStatus("Live from your Notion databases");
    document.getElementById("updated-text").textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
  } catch (err) {
    setStatus(`Could not connect to Notion — ${err.message}`, true);
    ["stat-experiments","stat-published","stat-inprogress","stat-conferences","stat-read"].forEach(id => setStat(id, "—"));
  }
}

if (getToken()) { showStats(); }
</script>
</body>
</html>
